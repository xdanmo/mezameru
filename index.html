<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEZAMERU</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    
    <div id="login-screen" class="login-screen active">
        <div class="login-content brutal-box">
            <h1>MEZAMERU</h1>
            <p class="mono-text">SIGN IN TO ACCESS YOUR HABITS</p>
            
            <div id="g_id_onload"
                 data-client_id="1057081070342-87s2apeim9b3qn1a4kol0p7l2gbttp3k.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin brutal-signin" data-type="standard" data-theme="filled_black" data-size="large"></div>
            
            <p id="login-status" class="mono-text blink" style="display: none;">[ SYNCING WITH CLOUD ]</p>
        </div>
    </div>

    <div class="app-container">
        
        <main id="tab-home" class="tab-content active">
            <header class="brutal-header">
                <div class="date-scroller-wrapper">
                    <div class="date-scroller" id="date-scroller"></div>
                </div>
                <h2 class="section-title" id="home-subtitle">DAILY HABITS</h2>
            </header>

            <div class="filter-controls">
                <button class="filter-btn active" data-filter="TODO">TO-DO</button>
                <button class="filter-btn" data-filter="COMPLETED">DONE</button>
                <button class="filter-btn" data-filter="SKIPPED">SKIPPED</button>
            </div>

            <div class="habit-list" id="home-habit-list"></div>
        </main>

        <main id="tab-edit" class="tab-content">
            <header class="brutal-header">
                <h2 class="section-title">MANAGE HABITS</h2>
            </header>

            <div class="habit-list" id="edit-habit-list"></div>

            <button class="brutal-btn fab-add-habit" id="btn-fab-add">
                [+] ADD NEW HABIT
            </button>
        </main>

        <main id="tab-analytics" class="tab-content">
            <header class="brutal-header">
                <h2 class="section-title">ANALYTICS</h2>
                <p class="mono-text">SELECT A HABIT TO VIEW DATA</p>
            </header>

            <div class="habit-list" id="analytics-habit-list"></div>
        </main>

        <main id="tab-account" class="tab-content">
            <div class="profile-section brutal-box">
                <div class="avatar">
                    <i class="ph-bold ph-user"></i>
                </div>
                <h2>PROFILE</h2>
                <p class="mono-text highlight">CLOUD SYNC : ACTIVE</p>
            </div>

            <button class="brutal-btn btn-logout" onclick="location.reload()">LOG OUT</button>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-target="tab-home">
                <i class="ph-bold ph-house"></i>
                <span>HOME</span>
            </button>
            <button class="nav-item" data-target="tab-edit">
                <i class="ph-bold ph-sliders-horizontal"></i>
                <span>MANAGE</span>
            </button>
            <button class="nav-item" data-target="tab-analytics">
                <i class="ph-bold ph-chart-line-up"></i>
                <span>DATA</span>
            </button>
            <button class="nav-item" data-target="tab-account">
                <i class="ph-bold ph-user"></i>
                <span>ACCOUNT</span>
            </button>
        </nav>

        <div class="sheet-overlay" id="sheet-overlay"></div>

        <div class="bottom-sheet brutal-box" id="status-sheet">
            <div class="sheet-header">
                <div>
                    <h3 id="sheet-title">HABIT NAME</h3>
                    <p id="sheet-target" class="mono-text">DAILY GOAL</p>
                </div>
                <button class="btn-close-sheet" id="btn-close-status">[X]</button>
            </div>
            
            <div class="sheet-content">
                <div class="slider-control brutal-box">
                    <div class="slider-header">
                        <span class="mono-text">PROGRESS</span>
                        <div class="progress-input-group">
                            <input type="number" id="sheet-current-input" class="huge-input" value="0">
                            <span id="sheet-max-display" class="huge-text">/0</span>
                        </div>
                    </div>
                    <input type="range" id="progress-slider" class="brutal-slider" min="0" max="10" value="0">
                </div>

                <button class="brutal-btn action-btn" id="btn-save-progress">SAVE PROGRESS</button>
                <div class="form-row">
                    <button class="brutal-btn action-btn" id="btn-mark-done">MARK DONE</button>
                    <button class="brutal-btn action-btn outline-btn" id="btn-mark-skip">MARK SKIPPED</button>
                </div>
            </div>
        </div>

        <div class="bottom-sheet brutal-box" id="edit-sheet">
            <div class="sheet-header">
                <div>
                    <h3 id="edit-sheet-title">EDIT HABIT</h3>
                    <p class="mono-text">HABIT DETAILS</p>
                </div>
                <button class="btn-close-sheet" id="btn-close-edit">[X]</button>
            </div>
            
            <div class="sheet-content">
                <div class="form-group">
                    <label class="mono-text">HABIT NAME</label>
                    <input type="text" id="edit-name-input" class="brutal-input" placeholder="E.G. DRINK WATER" autocomplete="off">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="mono-text">DAILY GOAL</label>
                        <input type="number" id="edit-target-input" class="brutal-input" min="1" placeholder="15">
                    </div>
                    <div class="form-group">
                        <label class="mono-text">UNIT</label>
                        <input type="text" id="edit-unit-input" class="brutal-input" placeholder="E.G. ML" autocomplete="off">
                    </div>
                </div>

                <button class="brutal-btn action-btn" id="btn-save-habit">SAVE HABIT</button>
            </div>
        </div>

        <div class="bottom-sheet brutal-box" id="analytics-sheet">
            <div class="sheet-header">
                <div>
                    <h3 id="analytics-sheet-title">HABIT NAME</h3>
                    <p class="mono-text">COMPLETION RATE %</p>
                </div>
                <button class="btn-close-sheet" id="btn-close-analytics">[X]</button>
            </div>
            
            <div class="sheet-content">
                <div class="analytics-controls">
                    <button class="brutal-btn filter-btn-small active" data-range="7days">7 DAYS</button>
                    <button class="brutal-btn filter-btn-small" data-range="week">THIS WEEK</button>
                    <button class="brutal-btn filter-btn-small" data-range="month">THIS MONTH</button>
                    <button class="brutal-btn filter-btn-small" data-range="custom">CUSTOM</button>
                </div>

                <div class="custom-range-container" id="custom-range-container" style="flex-direction: column; gap: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <span class="mono-text">TIMEFRAME</span>
                        <span class="mono-text" id="custom-days-display" style="font-size: 1rem; font-weight: 900; background: var(--acid); padding: 4px 8px; border: 2px solid var(--fg);">14 DAYS</span>
                    </div>
                    <input type="range" id="custom-days-slider" class="brutal-slider" min="1" max="100" value="14">
                </div>

                <div class="chart-container brutal-box">
                    <canvas id="analytics-chart"></canvas>
                </div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
