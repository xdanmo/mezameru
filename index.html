<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneSpot</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f7f6f2">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <style>
    .hide-scroll::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      background: transparent !important;
      -webkit-appearance: none !important;
    }
    .hide-scroll {
      -ms-overflow-style: none !important;
      scrollbar-width: none !important;
    }
  </style>
</head>

<body>
  <div class="app-container">
    
    <main class="feed-container" id="view-home">
      
      <div id="search-header" style="padding: 0 4px; background: transparent;">
        <div class="search-content" style="background: transparent;">
          
          <div style="max-width: 600px; margin: 0 auto 16px; position: relative; background: transparent;">
            <span class="material-symbols-outlined" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--outline-variant); pointer-events: none;">search</span>
            <input type="text" id="feed-search-input" placeholder="Search posts by title or link..." class="font-body-md"
              style="width: 100%; background-color: var(--surface-container-low); border: 1px solid var(--outline-variant); border-radius: var(--rounded-full); padding: 14px 16px 14px 48px; color: var(--on-surface); outline: none; transition: all 0.2s;"
              onfocus="this.style.backgroundColor='var(--surface-container)'; this.style.borderColor='var(--primary)';"
              onblur="this.style.backgroundColor='var(--surface-container-low)'; this.style.borderColor='var(--outline-variant)';" />
          </div>

          <div class="hide-scroll" style="max-width: 600px; margin: 0 auto 16px; display: flex; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 8px; align-items: center; background: transparent;">
            
            <div style="position: relative; flex-shrink: 0; display: flex; align-items: center; background: transparent;">
              <span class="material-symbols-outlined" style="position: absolute; left: 12px; color: var(--on-surface-variant); pointer-events: none; font-size: 18px;">filter_alt</span>
              <input type="text" id="tag-search-input" placeholder="Find tags..." class="font-label-sm"
                style="width: 115px; background-color: var(--background); border: 1px solid var(--outline-variant); border-radius: var(--rounded-full); padding: 10px 16px 10px 36px; color: var(--on-surface); outline: none; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); margin: 0;"
                onfocus="this.style.width='160px'; this.style.borderColor='var(--primary)';"
                onblur="if(!this.value) { this.style.width='115px'; this.style.borderColor='var(--outline-variant)'; }" />
            </div>

            <div id="search-tags-container" style="display: flex; gap: 8px; flex-wrap: nowrap; background: transparent;">
            </div>

          </div>
        </div>
      </div>

      <div class="masonry-grid" id="feed-grid"></div>
    </main>

    <main class="container" id="view-profile"
      style="display: none; padding-top: var(--spacing-xl); text-align: center; max-width: 600px; margin: 0 auto; background-color: var(--background);">
      <div
        style="background-color: var(--surface-container-low); border: 1px solid var(--tertiary-fixed-dim); border-radius: var(--rounded-xl); padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px;"
        class="shadow-ambient">
        <img id="profile-image" src="" alt="Profile"
          style="width: 96px; height: 96px; border-radius: 50%; object-fit: cover; background-color: var(--surface-container-highest); display: none;" />
        <div id="profile-placeholder"
          style="width: 96px; height: 96px; border-radius: 50%; background-color: var(--surface-container-highest); display: flex; align-items: center; justify-content: center; color: var(--on-surface-variant);">
          <span class="material-symbols-outlined" style="font-size: 48px;">person</span>
        </div>
        <div>
          <h1 id="profile-name" class="font-display" style="font-size: 24px;">Loading...</h1>
          <p id="profile-email" class="font-body-md" style="color: var(--on-surface-variant); margin-top: 4px;"></p>
        </div>
        <button id="btn-logout" class="font-label-sm shadow-ambient"
          style="background-color: var(--surface-container-highest); color: var(--error); border: 1px solid var(--error); border-radius: var(--rounded-full); padding: 12px 24px; margin-top: 16px; cursor: pointer; transition: all 0.2s;"
          onmouseover="this.style.backgroundColor='var(--error)'; this.style.color='var(--on-error)';"
          onmouseout="this.style.backgroundColor='var(--surface-container-highest)'; this.style.color='var(--error)';">Disconnect
          Dropbox</button>
      </div>
    </main>
    
    <main class="container" id="view-add"
      style="display: none; padding-top: var(--spacing-lg); max-width: 500px; padding-bottom: 120px; margin: 0 auto; background-color: var(--background);">
      
      <div style="margin-bottom: var(--spacing-lg); width: 100%;" id="add-preview-container"></div>

      <div class="shadow-ambient" style="background-color: var(--surface-container-low); border-radius: var(--rounded-xl); padding: var(--spacing-md); display: flex; flex-direction: column; gap: 16px; border: 1px solid var(--tertiary-fixed-dim);">
        
        <div style="position: relative; display: flex; flex-direction: column; gap: 12px;">
          <input type="text" id="add-title" placeholder="Post Title (max 100 chars)" maxlength="100" class="font-body-md"
            style="width: 100%; background-color: var(--surface-container-highest); border: 1px solid transparent; border-radius: var(--rounded-lg); padding: 16px; color: var(--on-surface); outline: none; transition: all 0.2s;"
            onfocus="this.style.borderColor='var(--primary)';" onblur="this.style.borderColor='transparent';" />
            
          <textarea id="add-description" placeholder="Description (optional)..." class="font-body-md"
            style="width: 100%; min-height: 100px; background-color: var(--surface-container-highest); border: 1px solid transparent; border-radius: var(--rounded-lg); padding: 16px; color: var(--on-surface); outline: none; transition: all 0.2s; resize: vertical;"
            onfocus="this.style.borderColor='var(--primary)';" onblur="this.style.borderColor='transparent';"></textarea>
        </div>

        <div style="display: flex; gap: 12px; width: 100%;">
          <div style="position: relative; flex: 1;">
            <div style="position: absolute; top: 0; bottom: 0; left: 0; padding-left: 16px; display: flex; align-items: center; pointer-events: none;">
              <span class="material-symbols-outlined" style="color: var(--outline-variant); font-size: 20px;">link</span>
            </div>
            <input type="text" id="add-link" placeholder="Paste a link..." class="font-body-md"
              style="width: 100%; background-color: var(--surface-container-highest); border: 1px solid transparent; border-radius: var(--rounded-lg); padding: 16px 16px 16px 48px; color: var(--on-surface); outline: none; transition: all 0.2s;"
              onfocus="this.style.borderColor='var(--primary)';"
              onblur="this.style.borderColor='transparent';" />
          </div>
          
          <button id="btn-show-anchor" type="button" class="font-label-sm" title="Add Anchor Text"
            style="display: flex; align-items: center; justify-content: center; background-color: var(--surface-container-highest); border-radius: var(--rounded-lg); padding: 0 20px; color: var(--on-surface); cursor: pointer; transition: background-color 0.2s;"
            onmouseover="this.style.backgroundColor='var(--surface-variant)';"
            onmouseout="this.style.backgroundColor='var(--surface-container-highest)';">
            <span class="material-symbols-outlined">text_fields</span>
          </button>
          
          <div id="anchor-container" style="display: none; position: relative; flex: 1;">
            <div style="position: absolute; top: 0; bottom: 0; left: 0; padding-left: 16px; display: flex; align-items: center; pointer-events: none;">
              <span class="material-symbols-outlined" style="color: var(--outline-variant); font-size: 20px;">title</span>
            </div>
            <input type="text" id="add-anchor" placeholder="Anchor text..." class="font-body-md"
              style="width: 100%; background-color: var(--surface-container-highest); border: 1px solid transparent; border-radius: var(--rounded-lg); padding: 16px 16px 16px 48px; color: var(--on-surface); outline: none; transition: all 0.2s;"
              onfocus="this.style.borderColor='var(--primary)';"
              onblur="this.style.borderColor='transparent';" />
          </div>
        </div>

        <div style="display: flex; gap: 12px;">
          <div style="position: relative; flex: 1;">
            <div style="position: absolute; top: 0; bottom: 0; left: 0; padding-left: 16px; display: flex; align-items: center; pointer-events: none;">
              <span class="material-symbols-outlined" style="color: var(--outline-variant); font-size: 20px;">image</span>
            </div>
            <input type="text" id="add-image" placeholder="Image URL..." class="font-body-md"
              style="width: 100%; background-color: var(--surface-container-highest); border: 1px solid transparent; border-radius: var(--rounded-lg); padding: 16px 16px 16px 48px; color: var(--on-surface); outline: none; transition: all 0.2s;"
              onfocus="this.style.borderColor='var(--primary)';"
              onblur="this.style.borderColor='transparent';" />
          </div>
          <label style="display: flex; align-items: center; justify-content: center; background-color: var(--surface-container-highest); border-radius: var(--rounded-lg); padding: 0 20px; color: var(--on-surface); cursor: pointer; transition: background-color 0.2s;"
            onmouseover="this.style.backgroundColor='var(--surface-variant)';"
            onmouseout="this.style.backgroundColor='var(--surface-container-highest)';">
            <span class="material-symbols-outlined">upload_file</span>
            <input type="file" id="add-image-file" accept="image/*" style="display: none;" />
          </label>
        </div>
      </div>

      <div style="margin-top: var(--spacing-lg);">
        <h2 class="font-label-sm" style="color: var(--on-surface-variant); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; margin-left: 4px;">Tags</h2>
        <div id="tags-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
      </div>

      <button id="btn-save-entry" class="font-label-sm shadow-ambient"
        style="width: 100%; background-color: var(--primary); color: var(--on-primary); border-radius: var(--rounded-full); padding: 18px var(--spacing-md); margin-top: 32px; transition: opacity 0.2s; cursor: pointer; border: none; outline: none;"
        onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">Save Post</button>
    </main>

    <div id="selection-bar"
      style="display: none; transform: translateY(200%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: fixed; bottom: 32px; left: 0; right: 0; justify-content: center; align-items: center; z-index: 99999;">
      <div class="shadow-nav"
        style="position: relative; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 16px; border-radius: var(--rounded-full); min-width: 280px; background-color: rgba(242, 240, 235, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5);">
        <span class="font-label-md" style="color: var(--on-surface); margin-left: 8px;" id="selection-count">0 Selected</span>
        <div style="display: flex; align-items: center; gap: 12px;">
          <button id="btn-edit" class="font-label-sm"
            style="background-color: var(--surface-container); color: var(--on-surface); border: 1px solid var(--outline-variant); border-radius: var(--rounded-full); padding: 8px 16px; cursor: pointer; display: none;">Edit</button>
          <button id="btn-delete" class="font-label-sm"
            style="background-color: var(--error); color: var(--on-error); border: none; border-radius: var(--rounded-full); padding: 8px 16px; cursor: pointer;">Delete</button>
          <div style="width: 1px; height: 24px; background-color: var(--outline-variant);"></div>
          <button id="btn-close-selection"
            style="display: flex; align-items: center; justify-content: center; background-color: transparent; border: none; color: var(--on-surface-variant); cursor: pointer; padding: 0;">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </div>
    </div>

    <div id="tag-selection-bar"
      style="display: none; transform: translateY(200%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: fixed; bottom: 32px; left: 0; right: 0; justify-content: center; align-items: center; z-index: 99999;">
      <div class="shadow-nav"
        style="position: relative; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 16px; border-radius: var(--rounded-full); min-width: 280px; background-color: rgba(242, 240, 235, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5);">
        <span class="font-label-md" style="color: var(--on-surface); margin-left: 8px;" id="tag-selection-count">0 Selected</span>
        <div style="display: flex; align-items: center; gap: 12px;">
          <button id="btn-edit-tag" class="font-label-sm"
            style="background-color: var(--surface-container); color: var(--on-surface); border: 1px solid var(--outline-variant); border-radius: var(--rounded-full); padding: 8px 16px; cursor: pointer; display: none;">Edit</button>
          <button id="btn-delete-tag" class="font-label-sm"
            style="background-color: var(--error); color: var(--on-error); border: none; border-radius: var(--rounded-full); padding: 8px 16px; cursor: pointer;">Delete</button>
          <div style="width: 1px; height: 24px; background-color: var(--outline-variant);"></div>
          <button id="btn-close-tag-selection"
            style="display: flex; align-items: center; justify-content: center; background-color: transparent; border: none; color: var(--on-surface-variant); cursor: pointer; padding: 0;">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </div>
    </div>

    <div id="bottom-nav"
      style="position: fixed; transform: translateY(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); bottom: 32px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; z-index: 99999;">
      <nav id="nav-container"
        style="position: relative; display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 12px 16px; border-radius: var(--rounded-full); min-width: 200px; background-color: rgba(242, 240, 235, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); overflow: hidden;">
        
        <div id="nav-toast" class="font-label-sm" style="position: absolute; inset: 0; background-color: transparent; color: var(--on-surface); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10;"></div>

        <div id="nav-indicator"
          style="position: absolute; left: 0; top: 0; width: 0; height: 0; background-color: var(--primary); border-radius: var(--rounded-full); opacity: 0; transition: none; z-index: 0;">
        </div>
        <a href="#/" class="nav-link" data-index="0"
          style="position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; padding: 16px; border-radius: var(--rounded-full); transition: color 0.5s ease, transform 0.5s ease, opacity 0.3s ease; color: var(--outline);">
          <span class="material-symbols-outlined">home</span>
        </a>
        <a href="#/add" class="nav-link" data-index="1"
          style="position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; padding: 16px; border-radius: var(--rounded-full); transition: color 0.5s ease, transform 0.5s ease, opacity 0.3s ease; color: var(--outline);">
          <span class="material-symbols-outlined">add</span>
        </a>
        <a href="#/profile" class="nav-link" data-index="2"
          style="position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; padding: 16px; border-radius: var(--rounded-full); transition: color 0.5s ease, transform 0.5s ease, opacity 0.3s ease; color: var(--outline);">
          <span class="material-symbols-outlined">person</span>
        </a>
      </nav>
    </div>

    <div id="detail-backdrop"
      style="position: fixed; inset: 0; z-index: 100000; background-color: rgba(0,0,0,0.35); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); opacity: 0; transition: opacity 0.3s ease; pointer-events: none;">
    </div>
    
    <div id="detail-sheet"
      style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 100001; background-color: var(--surface); border-radius: 24px 24px 0 0; max-height: 92dvh; overflow-y: auto; overscroll-behavior: contain; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);">
      <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px;">
        <button id="btn-sheet-edit" class="font-label-sm"
          style="display: flex; align-items: center; gap: 6px; background-color: var(--surface-container-high); border: 1px solid var(--outline-variant); border-radius: 9999px; padding: 8px 16px; color: var(--on-surface); cursor: pointer; transition: background-color 0.2s;">
          <span class="material-symbols-outlined" style="font-size: 16px;">edit</span> Edit
        </button>
        <button id="btn-sheet-close"
          style="background: var(--surface-container); border: none; border-radius: 9999px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--on-surface-variant);">
          <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
        </button>
      </div>
      <div id="detail-content" style="padding: 0 20px calc(48px + env(safe-area-inset-bottom)); overflow: hidden;">
      </div>
    </div>

    <div id="tag-edit-backdrop"
      style="position: fixed; inset: 0; z-index: 100002; background-color: rgba(0,0,0,0.35); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); opacity: 0; transition: opacity 0.3s ease; pointer-events: none; display: flex; align-items: center; justify-content: center;">
      <div id="tag-edit-modal" class="shadow-ambient"
        style="background-color: var(--surface-container-low); border: 1px solid var(--tertiary-fixed-dim); border-radius: var(--rounded-xl); padding: 24px; width: 90%; max-width: 340px; transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);">
        <h2 class="font-headline-md" style="margin-bottom: 16px; color: var(--on-surface); font-size: 20px;">Edit Tag</h2>
        <input type="text" id="tag-edit-input" class="font-body-md"
          style="width: 100%; background-color: var(--surface-container-highest); border: 1px solid transparent; border-radius: var(--rounded-lg); padding: 12px 16px; color: var(--on-surface); outline: none; transition: all 0.2s; margin-bottom: 24px;"
          onfocus="this.style.borderColor='var(--primary)';" onblur="this.style.borderColor='transparent';" />
        <div style="display: flex; justify-content: flex-end; gap: 8px;">
          <button id="btn-tag-edit-cancel" class="font-label-sm"
            style="background-color: transparent; color: var(--on-surface-variant); border: none; padding: 10px 16px; border-radius: var(--rounded-full); cursor: pointer; transition: background-color 0.2s;"
            onmouseover="this.style.backgroundColor='var(--surface-container-highest)';"
            onmouseout="this.style.backgroundColor='transparent';">Cancel</button>
          <button id="btn-tag-edit-save" class="font-label-sm shadow-ambient"
            style="background-color: var(--primary); color: var(--on-primary); border: none; padding: 10px 24px; border-radius: var(--rounded-full); cursor: pointer; transition: opacity 0.2s;"
            onmouseover="this.style.opacity='0.9';" onmouseout="this.style.opacity='1';">Save</button>
        </div>
      </div>
    </div>

    <div id="auth-overlay"
      style="position: fixed; inset: 0; background-color: var(--background); z-index: 200000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <h1 class="font-display" style="margin-bottom: var(--spacing-md);">OneSpot</h1>
      <p class="font-body-lg" style="color: var(--on-surface-variant); margin-bottom: var(--spacing-xl);">Your data,
        your drive.</p>
      <button id="btn-login" class="font-label-sm shadow-ambient"
        style="background-color: var(--primary); color: var(--on-primary); border-radius: var(--rounded-full); padding: 16px 32px; cursor: pointer; transition: opacity 0.2s; display: none;">Connect
        Dropbox</button>
      <p id="auth-status" class="font-label-sm"
        style="margin-top: var(--spacing-md); color: var(--on-surface-variant);">Initializing...</p>
        
      <p class="font-label-sm" style="position: absolute; bottom: 32px; color: var(--on-surface-variant); opacity: 0.8; letter-spacing: 0.05em;">Created by Anmol Jaiswal</p>
    </div>
  </div>

  <!-- Use the official Dropbox SDK from jsDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/dropbox@10.34.0/dist/Dropbox-sdk.min.js"></script>
  <script src="app.js" type="module"></script>
</body>

</html>
